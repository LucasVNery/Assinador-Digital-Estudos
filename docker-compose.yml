version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - db_data:/app/backend/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=troque-este-secret-em-producao-por-um-valor-aleatorio-longo
    restart: unless-stopped

volumes:
  db_data:
